<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Physics Game Sandbox</title>
    <!-- Use Outfit font for premium aesthetics -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Screen 1: Landing -->
        <div id="screen-landing" class="screen active">
            <h1 class="title">B O N K</h1>
            <div class="panel">
                <input type="text" id="usernameInput" placeholder="Enter username" maxlength="16">
                <button id="btnCreateRoom" class="primary">Create Room</button>
                <div class="divider"><span>OR</span></div>
                <div class="join-row">
                    <input type="text" id="roomCodeInput" placeholder="Room Code" maxlength="6">
                    <button id="btnJoinRoom" class="primary">Join</button>
                </div>
                <p id="landingError" class="error"></p>
            </div>
        </div>

        <!-- Screen 2: Lobby -->
        <div id="screen-lobby" class="screen">
            <h2 class="room-title">Room: <span id="lobbyRoomCode"></span> <button id="btnCopyCode" class="small">Copy</button></h2>
            <div class="panel">
                <h3>Players (<span id="playerCount">0</span>/8)</h3>
                <ul id="playerList"></ul>
                
                <div id="hostControls" style="display: none;">
                    <div class="setting-row">
                        <label for="pointsToWin">Points to win:</label>
                        <select id="pointsToWin">
                            <option value="3">3</option>
                            <option value="5" selected>5</option>
                            <option value="10">10</option>
                        </select>
                    </div>
                    <button id="btnStartGame" class="primary large">Start Game</button>
                </div>
                
                <div id="nonHostControls" style="display: none;">
                    <p class="waiting-text">Waiting for host to start...</p>
                </div>

                <button id="btnLeaveLobby" class="secondary">Leave Room</button>
            </div>
        </div>

        <!-- Screen 3: Game -->
        <div id="screen-game" class="screen">
            <div class="game-container">
                <canvas id="gameCanvas" tabindex="0"></canvas>
                <div id="scoreboard" class="overlay-panel">
                    <h3>Scores</h3>
                    <ul id="scoreList"></ul>
                </div>
                <div id="round-message" class="flash-message hidden"></div>
                <div id="eliminated-message" class="flash-message hidden"></div>
            </div>
        </div>

        <!-- Screen 4: Match End -->
        <div id="screen-matchend" class="screen">
            <h1 id="matchWinnerMessage" class="title"></h1>
            <div class="panel">
                <h3>Final Scores</h3>
                <ul id="finalScoreList"></ul>
                
                <div id="matchEndHostControls" style="display: none;">
                    <button id="btnPlayAgain" class="primary large">Play Again</button>
                </div>
                
                <button id="btnLeaveMatch" class="secondary">Leave Room</button>
            </div>
        </div>
    </div>
    
    <!-- Load Socket.io supplied by the server -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
